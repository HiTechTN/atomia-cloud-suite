---
# Authelia Configuration for Atomia Cloud Suite
# https://www.authelia.com/configuration/

theme: dark
default_redirection_url: http://localhost

server:
  host: 0.0.0.0
  port: 9091

log:
  level: info

# JWT secret is injected via AUTHELIA_JWT_SECRET env var
jwt_secret: "{{ env \"AUTHELIA_JWT_SECRET\" }}"

authentication_backend:
  file:
    path: /config/users_database.yml
    password:
      algorithm: argon2id
      iterations: 1
      salt_length: 16
      parallelism: 8
      memory: 64

# Session configuration
session:
  name: atomia_session
  # Secret injected via AUTHELIA_SESSION_SECRET env var
  secret: "{{ env \"AUTHELIA_SESSION_SECRET\" }}"
  expiration: 1h
  inactivity: 5m
  domain: localhost

# Encrypted storage for tokens and TOTP secrets
storage:
  encryption_key: "{{ env \"AUTHELIA_STORAGE_ENCRYPTION_KEY\" }}"
  local:
    path: /var/lib/authelia/db.sqlite3

# Notification transport (use filesystem for offline / SMTP for production)
notifier:
  filesystem:
    filename: /var/lib/authelia/notification.txt
  # smtp:
  #   username: ${MAIL_USER}
  #   password: ${MAIL_PASSWORD}
  #   host: ${MAIL_HOST}
  #   port: ${MAIL_PORT}
  #   sender: "Atomia Auth <noreply@atomia.local>"

# Access control rules
# First matching rule wins
access_control:
  default_policy: deny

  rules:
    # Authelia portal itself — always open
    - domain: localhost
      resources:
        - "^/api/.*"
      policy: bypass

    # Multi-user isolation rules
    # Admins can access everything
    - domain: localhost
      subject: "group:admins"
      policy: two_factor

    # Developers can access common tools
    - domain: localhost
      resources:
        - "^/chat.*"
        - "^/gitea.*"
      subject: "group:developers"
      policy: one_factor

    # Isolated workspaces
    # Ensure users can ONLY access paths starting with their own username
    - domain: localhost
      resources:
        - "^/u/([^/]+)/.*"
      subject: "user:$1"
      policy: one_factor

    # Default policy for any other internal services
    - domain: "*.atomia.local"
      networks:
        - 172.28.0.0/16
      policy: bypass