global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'atomia-monitor'

# Alert rules
rule_files:
  - 'alerts.yml'

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Container resource metrics (CPU, RAM, disk per container)
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    metric_relabel_configs:
      - source_labels: [container_label_com_docker_compose_service]
        target_label: service

  # Ollama AI backend
  - job_name: 'ollama'
    metrics_path: /metrics
    static_configs:
      - targets: ['ollama:11434']

  # Gitea
  - job_name: 'gitea'
    metrics_path: /metrics
    static_configs:
      - targets: ['gitea:3000']

  # Open WebUI
  - job_name: 'open-webui'
    metrics_path: /metrics
    static_configs:
      - targets: ['open-webui:8080']
    honor_labels: true
