groups:
  - name: atomia-alerts
    rules:

      # Container down for > 1 minute
      - alert: ContainerDown
        expr: absent(container_last_seen{name=~"atomia-.*"})
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Container {{ $labels.name }} is down"
          description: "Container {{ $labels.name }} has been unreachable for more than 1 minute."

      # High CPU usage (> 85% for 5 minutes)
      - alert: HighCPUUsage
        expr: rate(container_cpu_usage_seconds_total{name=~"atomia-.*"}[5m]) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU on {{ $labels.name }}"
          description: "{{ $labels.name }} CPU usage is above 85% for 5 minutes."

      # High memory usage (> 90%)
      - alert: HighMemoryUsage
        expr: >
          (container_memory_usage_bytes{name=~"atomia-.*"} /
           container_spec_memory_limit_bytes{name=~"atomia-.*"}) * 100 > 90
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High memory on {{ $labels.name }}"
          description: "{{ $labels.name }} is using more than 90% of its memory limit."

      # Disk usage > 80%
      - alert: DiskSpaceLow
        expr: >
          (node_filesystem_avail_bytes{mountpoint="/"} /
           node_filesystem_size_bytes{mountpoint="/"}) * 100 < 20
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Disk space low"
          description: "Root filesystem has less than 20% available space."
