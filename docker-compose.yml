# Atomia Cloud Suite - Docker Compose Configuration
# Self-hosted AI-powered development environment
# Version: 2.0 - With Gitea Code Review

services:
  # ============================================
  # OLLAMA - AI Backend (GPU-accelerated)
  # ============================================
  ollama:
    image: ollama/ollama:latest
    container_name: atomia-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_MODELS=/models
      - OLLAMA_KEEP_ALIVE=24h
      # GPU Configuration (auto-detected if not specified)
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      # Persistent storage for AI models - survives container recreation
      - ollama-models:/models:rw
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
        limits:
          memory: 16G
          cpus: '4.0'
    networks:
      - atomia-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # OPEN WEBUI - Chat Interface
  # ============================================
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: atomia-openwebui
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_SECRET_KEY=change_this_secure_key_in_production
      - WEBUI_NAME=Atomia Chat
      # Optional: Enable authentication
      # - WEBUI_AUTH_SECRET=your_secure_secret_key
    volumes:
      # Persistent storage for chats, settings, uploads
      - openwebui-data:/app/backend/data:rw
    depends_on:
      ollama:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
    networks:
      - atomia-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ============================================
  # VS CODE SERVER (code-server)
  # ============================================
  code-server:
    image: codercom/code-server:latest
    container_name: atomia-codeserver
    restart: unless-stopped
    ports:
      - "8443:8443"
    environment:
      - PASSWORD=change_this_password
      - SUDO_PASSWORD=$PASSWORD
      - TZ=Europe/Paris
      - CEREBRO_ENABLED=false
      - GIT_EDITOR=/usr/bin/nano
    volumes:
      # Persistent storage for VS Code config and extensions
      - code-server-config:/home/coder:rw
      # Projects directory - store your code here
      - code-server-projects:/projects:rw
      # Continue config for AI coding
      - ./continue:/extension/continue:ro
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: '4.0'
    networks:
      - atomia-network

  # ============================================
  # GITEA - Self-hosted Git Repository
  # ============================================
  gitea:
    image: gitea/gitea:latest
    container_name: atomia-gitea
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "2222:22"
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__server__DOMAIN=localhost
      - GITEA__server__ROOT_URL=http://localhost:3000/
      - GITEA__server__HTTP_PORT=3000
      - GITEA__server__SSH_PORT=2222
      - GITEA__server__DISABLE_SSH=false
      - GITEA__security__INSTALL_LOCK=true
      - GITEA__database__DB_TYPE=sqlite3
      - GITEA__service__REGISTER_EMAIL_CONFIRM=false
      - GITEA__service__ENABLE_NOTIFY_MAIL=false
      - GITEA__server__DEFAULT_KEEP_EMAIL_PRIVATE=false
      - GITEA__server__DEFAULT_ALLOW_CREATE_ORGANIZATION=true
      - GITEA__server__DEFAULT_ENABLE_TIMETRACKING=true
      - GITEA__openid__ENABLE_OPENID_SIGNIN=true
      - GITEA__openid__ENABLE_OPENID_SIGNUP=true
    volumes:
      # Persistent storage for git repositories, database, attachments
      - gitea-data:/data:rw
      # SSH keys persistence
      - gitea-ssh:/data/git/.ssh:rw
    depends_on:
      - code-server
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
    networks:
      - atomia-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ============================================
  # NGINX PROXY MANAGER - Reverse Proxy & SSL
  # ============================================
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: atomia-nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    environment:
      - DB_SQLITE_FILE=/data/database.sqlite
      # Default credentials: admin@example.com / changeme
    volumes:
      - nginx-proxy-data:/data:rw
      - nginx-proxy-letsencrypt:/etc/letsencrypt:rw
    # Mount docker.sock for dynamic container discovery
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    networks:
      - atomia-network

networks:
  atomia-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
    name: atomia-network

# ============================================
# PERSISTENT VOLUMES
# All data survives container recreation
# ============================================
volumes:
  # Ollama - AI Models (largest volume, typically 10-50GB+)
  ollama-models:
    name: atomia-ollama-models
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${OLLAMA_DATA_PATH:-./data/ollama}

  # Open WebUI - Chats, settings, uploads
  openwebui-data:
    name: atomia-openwebui-data
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${OPENWEBUI_DATA_PATH:-./data/openwebui}

  # Code Server - Config, extensions, themes
  code-server-config:
    name: atomia-codeserver-config
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${CODER_DATA_PATH:-./data/code-server}

  # Code Server - Your projects (git repos, source code)
  code-server-projects:
    name: atomia-codeserver-projects
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PROJECTS_PATH:-./projects}

  # Gitea - Git repositories, database, attachments
  gitea-data:
    name: atomia-gitea-data
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${GITEA_DATA_PATH:-./data/gitea}

  # Gitea - SSH keys
  gitea-ssh:
    name: atomia-gitea-ssh
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${GITEA_SSH_PATH:-./data/gitea-ssh}

  # Nginx Proxy Manager - SSL certificates, config
  nginx-proxy-data:
    name: atomia-nginx-proxy-data
    driver: local

  nginx-proxy-letsencrypt:
    name: atomia-nginx-proxy-le
    driver: local
