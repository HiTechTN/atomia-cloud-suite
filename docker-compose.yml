# Atomia Cloud Suite - Docker Compose Configuration
# Version: 4.1 - Deploy Pipelines + Gitea + Advanced AI + Custom Models + RAG + Remote Debug

services:

  # ============================================
  # OLLAMA - AI Backend (GPU-auto-detected)
  # ============================================
  ollama:
    image: ollama/ollama:latest
    container_name: atomia-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0
      # Default model storage path (bind-mounted below)
      - OLLAMA_MODELS=/models
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS:-2}
      # GPU passthrough — works even when no GPU present (CPU fallback)
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - ollama-models:/models:rw
    # GPU reservation is attempted; Docker ignores it gracefully when no GPU
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
        limits:
          memory: ${OLLAMA_MEM_LIMIT:-16G}
          cpus: '${OLLAMA_CPU_LIMIT:-4.0}'
    networks:
      - atomia-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ============================================
  # QDRANT - Vector Store for RAG + Chat History
  # ============================================
  qdrant:
    image: qdrant/qdrant:latest
    container_name: atomia-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY:-}
    volumes:
      - qdrant-data:/qdrant/storage:rw
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
    networks:
      - atomia-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # OPEN WEBUI - Chat + RAG + Persistent History
  # ============================================
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: atomia-openwebui
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-change_this_secure_key_32chars_min}
      - WEBUI_NAME=Atomia Chat
      # Auth: require login for all chat access
      - WEBUI_AUTH=true
      - DEFAULT_USER_ROLE=${OPENWEBUI_DEFAULT_ROLE:-user}
      # RAG — backed by Qdrant vector store
      - ENABLE_RAG=true
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - RAG_EMBEDDING_MODEL=${RAG_EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      - RAG_EMBEDDING_MODEL_TRUST_REMOTE_CODE=true
      # Chat history persistence (stored in the mounted volume + Qdrant)
      - ENABLE_CHAT_HISTORY=true
      - ENABLE_MESSAGE_RATING=true
    volumes:
      - openwebui-data:/app/backend/data:rw
    depends_on:
      ollama:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
    networks:
      - atomia-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ============================================
  # AUTHELIA - SSO & MFA Authentication Gateway
  # ============================================
  authelia:
    image: authelia/authelia:latest
    container_name: atomia-authelia
    restart: unless-stopped
    ports:
      - "9091:9091"
    environment:
      - TZ=Europe/Paris
      - AUTHELIA_JWT_SECRET=${AUTHELIA_JWT_SECRET:-change_this_jwt_secret_min32chars}
      - AUTHELIA_SESSION_SECRET=${AUTHELIA_SESSION_SECRET:-change_this_session_secret_32c}
      - AUTHELIA_STORAGE_ENCRYPTION_KEY=${AUTHELIA_STORAGE_KEY:-change_this_storage_key_32chars}
    volumes:
      - ./authelia/configuration.yml:/config/configuration.yml:ro
      - ./authelia/users_database.yml:/config/users_database.yml:rw
      - authelia-data:/var/lib/authelia:rw
    networks:
      - atomia-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9091/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ============================================
  # VS CODE SERVER - SSH + Extensions + Remote Debug
  # ============================================
  code-server:
    image: codercom/code-server:latest
    container_name: atomia-codeserver
    restart: unless-stopped
    ports:
      - "8443:8080"
      - "2223:22"
      # Remote debug ports (Node, Python debugpy, Go dlv)
      - "9229:9229"   # Node.js inspector
      - "5678:5678"   # Python debugpy
      - "2345:2345"   # Go delve
    environment:
      - PASSWORD=${CODER_PASSWORD:-change_this_password}
      - SUDO_PASSWORD=${CODER_PASSWORD:-change_this_password}
      - TZ=Europe/Paris
      - CEREBRO_ENABLED=false
      - GIT_EDITOR=/usr/bin/nano
      - EXTENSION_URLS=${EXTENSION_URLS:-}
      # GitHub Integration
      - GITHUB_PAT=${GITHUB_PAT:-}
      - GITHUB_SSH_KEY=${GITHUB_SSH_KEY:-}
      # Gitea integration
      - GITEA_DOMAIN=${GITEA_DOMAIN:-localhost}
      - GITEA_SSH_PORT=${GITEA_SSH_PORT:-2222}
      - GITEA_HTTP_PORT=${GITEA_HTTP_PORT:-3000}
      - GIT_USER_NAME=${GIT_USER_NAME:-Atomia Developer}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL:-dev@atomia.local}
      # RAG
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - OLLAMA_HOST=http://ollama:11434
      - RAG_EMBED_MODEL=${RAG_EMBEDDING_MODEL:-nomic-embed-text}
    volumes:
      - code-server-config:/home/coder:rw
      - code-server-projects:/projects:rw
      - ./continue:/extension/continue:ro
      - ./code-server-init.sh:/usr/local/bin/init.sh:ro
      - ./rag/rag-index.sh:/extension/rag/rag-index.sh:ro
      - ./models/custom-model-upload.sh:/extension/models/custom-model-upload.sh:ro
      - ./scripts:/extension/scripts:ro
      - ./debug-templates:/extension/debug-templates:ro
      - ./deploy:/extension/deploy:ro
      - code-server-ssh:/home/coder/.ssh:rw
    entrypoint: ["/bin/bash", "/usr/local/bin/init.sh"]
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: '4.0'
    networks:
      - atomia-network

  # ============================================
  # GITEA - Self-hosted Git + Auth + Email + CI/CD
  # ============================================
  gitea:
    image: gitea/gitea:latest
    container_name: atomia-gitea
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "2222:22"
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__server__DOMAIN=${GITEA_DOMAIN:-localhost}
      - GITEA__server__ROOT_URL=${GITEA_ROOT_URL:-http://localhost:3000/}
      - GITEA__server__HTTP_PORT=3000
      - GITEA__server__SSH_PORT=2222
      - GITEA__server__DISABLE_SSH=false
      - GITEA__security__INSTALL_LOCK=true
      - GITEA__database__DB_TYPE=sqlite3
      - GITEA__service__REGISTER_EMAIL_CONFIRM=false
      - GITEA__service__ENABLE_NOTIFY_MAIL=${GITEA_ENABLE_MAIL:-false}
      - GITEA__service__DISABLE_REGISTRATION=${GITEA_DISABLE_REGISTRATION:-false}
      - GITEA__service__REQUIRE_SIGNIN_VIEW=${GITEA_REQUIRE_SIGNIN:-false}
      - GITEA__service__ENABLE_CAPTCHA=${GITEA_ENABLE_CAPTCHA:-false}
      - GITEA__server__DEFAULT_ALLOW_CREATE_ORGANIZATION=true
      - GITEA__server__DEFAULT_ENABLE_TIMETRACKING=true
      - GITEA__security__PASSWORD_COMPLEXITY=off
      - GITEA__security__MIN_PASSWORD_LENGTH=8
      - GITEA__security__PASSWORD_HASH_ALGO=pbkdf2
      - GITEA__session__PROVIDER=file
      - GITEA__session__COOKIE_SECURE=false
      - GITEA__session__COOKIE_NAME=atomia_gitea
      - GITEA__mailer__ENABLED=${MAIL_ENABLED:-false}
      - GITEA__mailer__HOST=${MAIL_HOST:-}
      - GITEA__mailer__PORT=${MAIL_PORT:-587}
      - GITEA__mailer__FROM=${MAIL_FROM:-noreply@atomia.local}
      - GITEA__mailer__USER=${MAIL_USER:-}
      - GITEA__mailer__PASSWD=${MAIL_PASSWORD:-}
      - GITEA__mailer__SKIP_VERIFY=${MAIL_SKIP_VERIFY:-true}
      - GITEA__actions__ENABLED=true
      - GITEA__actions__DEFAULT_ACTIONS_URL=https://gitea.com/actions
    volumes:
      - gitea-data:/data:rw
      - gitea-ssh:/data/git/.ssh:rw
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      - authelia
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
    networks:
      - atomia-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ============================================
  # GITEA RUNNER - CI/CD
  # ============================================
  gitea-runner:
    image: gitea/act_runner:latest
    container_name: atomia-gitea-runner
    restart: unless-stopped
    environment:
      - GITEA_INSTANCE_URL=http://gitea:3000
      - GITEA_RUNNER_REGISTRATION_TOKEN=${GITEA_RUNNER_TOKEN:-}
      - GITEA_RUNNER_NAME=atomia-runner
      - GITEA_RUNNER_LABELS=ubuntu-latest:hosted,ubuntu-22.04:hosted
      - GITEA_RUNNER_CAPACITY=2
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - gitea-runner-data:/data:rw
      - /var/run/docker.sock:/var/run/docker.sock:rw
    depends_on:
      - gitea
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
    networks:
      - atomia-network

  # ============================================
  # NGINX PROXY MANAGER - Reverse Proxy + SSL
  # ============================================
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: atomia-nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    environment:
      - DB_SQLITE_FILE=/data/database.sqlite
    volumes:
      - nginx-proxy-data:/data:rw
      - nginx-proxy-letsencrypt:/etc/letsencrypt:rw
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - authelia
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    networks:
      - atomia-network

  # ============================================
  # PROMETHEUS - Metrics scraper
  # ============================================
  prometheus:
    image: prom/prometheus:latest
    container_name: atomia-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus:rw
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
    networks:
      - atomia-network

  # ============================================
  # CADVISOR - Container metrics exporter
  # ============================================
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: atomia-cadvisor
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    networks:
      - atomia-network

  # ============================================
  # GRAFANA - Dashboard & Alerting
  # ============================================
  grafana:
    image: grafana/grafana:latest
    container_name: atomia-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SERVER_ROOT_URL=http://localhost:3001
    volumes:
      - grafana-data:/var/lib/grafana:rw
      - ./monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./monitoring/grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
    networks:
      - atomia-network

networks:
  atomia-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
    name: atomia-network

# ============================================
# PERSISTENT VOLUMES — all bind-mounted locally
# ============================================
volumes:
  ollama-models:
    name: atomia-ollama-models
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${OLLAMA_DATA_PATH:-./data/ollama}

  qdrant-data:
    name: atomia-qdrant-data
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${QDRANT_DATA_PATH:-./data/qdrant}

  openwebui-data:
    name: atomia-openwebui-data
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${OPENWEBUI_DATA_PATH:-./data/openwebui}

  authelia-data:
    name: atomia-authelia-data
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${AUTHELIA_DATA_PATH:-./data/authelia}

  code-server-config:
    name: atomia-codeserver-config
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${CODER_DATA_PATH:-./data/code-server}

  code-server-projects:
    name: atomia-codeserver-projects
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PROJECTS_PATH:-./projects}

  code-server-ssh:
    name: atomia-codeserver-ssh
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${CODER_SSH_PATH:-./data/code-server-ssh}

  gitea-data:
    name: atomia-gitea-data
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${GITEA_DATA_PATH:-./data/gitea}

  gitea-ssh:
    name: atomia-gitea-ssh
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${GITEA_SSH_PATH:-./data/gitea-ssh}

  gitea-runner-data:
    name: atomia-gitea-runner-data
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${GITEA_RUNNER_PATH:-./data/gitea-runner}

  nginx-proxy-data:
    name: atomia-nginx-proxy-data
    driver: local

  nginx-proxy-letsencrypt:
    name: atomia-nginx-proxy-le
    driver: local

  prometheus-data:
    name: atomia-prometheus-data
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PROMETHEUS_DATA_PATH:-./data/prometheus}

  grafana-data:
    name: atomia-grafana-data
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${GRAFANA_DATA_PATH:-./data/grafana}