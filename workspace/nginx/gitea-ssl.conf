# Nginx SSL Configuration for Gitea
# This configuration should be used with Nginx Proxy Manager
# or as a template for manual SSL setup

# HTTP to HTTPS redirect
server {
    listen 80;
    server_name git.atomia.local;

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS Proxy to Gitea
server {
    listen 443 ssl http2;
    server_name git.atomia.local;

    # SSL Certificate (configure via Nginx Proxy Manager or manually)
    # ssl_certificate /etc/letsencrypt/live/atomia.local/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/atomia.local/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    location / {
        proxy_pass http://172.28.0.0/16:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support for Gitea
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # SSH Git over HTTPS (Git smart protocol)
    location /git/ {
        proxy_pass http://172.28.0.0/16:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
